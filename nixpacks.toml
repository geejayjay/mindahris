# Nixpacks configuration for MinDA HRIS (CodeIgniter 3 + MSSQL)
providers = ["php"]

[variables]
# Fallback all non-file requests to index.php (replaces .htaccess RewriteRule)
NIXPACKS_PHP_FALLBACK_PATH = "/index.php"
# PHP version
NIXPACKS_PHP_VERSION = "8.1"
# Use port 9003 instead of 80 (port 80 is used by Traefik)
PORT = "9003"

[phases.setup]
# Core PHP + FreeTDS for MSSQL connectivity + GD for image processing
nixPkgs = ["php81", "php81Packages.composer", "php81Extensions.pdo", "php81Extensions.mbstring", "php81Extensions.gd", "php81Extensions.curl", "php81Extensions.openssl", "php81Extensions.zip", "freetds", "php81Extensions.pdo_dblib"]
aptPkgs = ["freetds-dev", "freetds-bin", "libsybdb5"]

[phases.install]
dependsOn = ["setup"]
cmds = [
    # Configure FreeTDS to connect to MSSQL
    "printf '[global]\\n\\ttds version = 7.4\\n\\tclient charset = UTF-8\\n' > /etc/freetds/freetds.conf",
    # Install composer dependencies (if any are added later)
    "if [ -f composer.json ]; then composer install --no-dev --optimize-autoloader --no-interaction; fi"
]

[phases.build]
dependsOn = ["install"]
cmds = [
    # Ensure writable directories exist
    "mkdir -p application/cache application/logs",
    "chmod -R 777 application/cache application/logs"
]

[start]
cmd = "php -S 0.0.0.0:${PORT:-9003} -t /app/."
